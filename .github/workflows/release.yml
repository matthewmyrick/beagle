name: release

# Pushing a tag like v0.1.0 runs the full CI gate, cross-builds release
# binaries, and publishes them (with sha256 checksums) to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint (pedantic, zero warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Tag must match Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match cli/Cargo.toml version $version"
            exit 1
          fi

  build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: cli
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: cli
      - name: Package
        # Asset names are version-less so
        # `releases/latest/download/beagle-<target>.tar.gz` always works.
        # Runs at the repo root: the binary comes from cli/target, the
        # docs from the root — the asset layout is unchanged, which the
        # self-updater (`beagle update`) depends on.
        run: |
          name="beagle-${{ matrix.target }}"
          mkdir "$name"
          cp "cli/target/${{ matrix.target }}/release/beagle" "$name/"
          cp README.md LICENSE CHANGELOG.md "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            beagle-*.tar.gz
            beagle-*.tar.gz.sha256
          generate_release_notes: true
