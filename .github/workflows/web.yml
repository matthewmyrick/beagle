name: web

# Path-filtered, like the desktop pipeline (#42): runs only when the web
# app changes. Builds against whatever rcas/ is present (none in CI → the
# site renders its empty state, which still validates the build).
on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/web.yml"]
  pull_request:
    paths: ["web/**", ".github/workflows/web.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Format (prettier)
        run: npm run format:check
      - name: Typecheck (astro check)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm run test
      - name: Build (static site)
        run: npm run build
