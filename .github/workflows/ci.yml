name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# The Rust CLI/TUI lives under cli/ (the repo is heading toward a
# cli/ + web/ + desktop/ monorepo — see #41); every cargo invocation
# runs there.
defaults:
  run:
    working-directory: cli

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint (pedantic, zero warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Docs build cleanly
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
