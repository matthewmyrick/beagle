# Serves the static Astro output. Listens on 8080 so the container can run
# unprivileged; Astro emits per-route directories, so `$uri/` resolves the
# trailing-slash incident URLs to their index.html.
server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Hashed build assets are immutable — cache them hard.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ $uri.html =404;
  }
}
