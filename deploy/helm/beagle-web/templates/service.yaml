apiVersion: v1
kind: Service
metadata:
  name: {{ include "beagle-web.fullname" . }}
  labels:
    {{- include "beagle-web.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "beagle-web.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
