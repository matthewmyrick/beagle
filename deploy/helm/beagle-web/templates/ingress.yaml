{{- if .Values.ingress.enabled }}
{{- $svc := include "beagle-web.fullname" . }}
{{- $port := .Values.service.port }}
{{- if .Values.auth.enabled }}
{{- $svc = printf "%s-auth" (include "beagle-web.fullname" .) }}
{{- $port = 4180 }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "beagle-web.fullname" . }}
  labels:
    {{- include "beagle-web.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tlsSecret }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecret }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Routes to the auth proxy when auth is enabled, else the site.
                name: {{ $svc }}
                port:
                  number: {{ $port }}
{{- end }}
