{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "beagle-web.fullname" . }}-auth
  labels:
    {{- include "beagle-web.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ required "auth.clientSecret is required (or set auth.existingSecret)" .Values.auth.clientSecret | quote }}
  cookie-secret: {{ required "auth.cookieSecret is required (or set auth.existingSecret)" .Values.auth.cookieSecret | quote }}
{{- end }}
